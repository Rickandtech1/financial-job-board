name: Send Daily Job Board Digest

on:
  push:
    branches: [main]
    paths: ['job_board.html']
  workflow_dispatch:

jobs:
  send-email:
    runs-on: ubuntu-latest
    steps:
      - name: Send digest email via Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'REDACTED' }}
          TO_EMAIL: ricktey02@gmail.com
        run: |
          python3 << 'PYEOF'
          import json, subprocess, tempfile, os

          resend_api_key = os.environ.get("RESEND_API_KEY", "REDACTED")
          to_email = os.environ.get("TO_EMAIL", "ricktey02@gmail.com")

          new_jobs = [
              {
                  "company": "Vancity Credit Union",
                  "role": "Financial Services Representative – Lonsdale Branch",
                  "location": "North Vancouver, BC",
                  "arrangement": "On-site",
                  "employment": "Full-Time",
                  "salary": "$27.21/hr (~$56,600/yr)",
                  "source": "Vancity Careers",
                  "url": "https://recruiting.ultipro.com/VAN5000VCSCU/JobBoard/a46cbdaa-ca2c-49b6-8d2b-e0ceaafa0e25/OpportunityDetail?opportunityId=c2c66b86-5c3f-48ff-9a00-87a5dac27cd2&postingId=a57eeacc-bcd6-4847-ae4f-350e6329778a",
                  "fitScore": 93,
                  "dealbreaker": False,
                  "whyFit": "Vancity's FSR at Lonsdale is the same A-tier archetype as Fairview and Kerrisdale — advice-first, unionized, full-time at $56,600/yr. North Vancouver's membership profile (higher average wealth, mortgage-heavy households) adds a meaningful advisory dimension. Mutual funds licensing is supported post-hire; no cert-at-hire barrier applies.",
                  "hook": "Lonsdale's membership profile — established North Vancouver homeowners building wealth — is exactly the client base I'm excited to serve; my MBA depth and CSC Exam 1 progress make me well-positioned to deliver the kind of advice-forward service Vancity is known for."
              },
              {
                  "company": "BMO Nesbitt Burns",
                  "role": "Investment Associate – BMO Nesbitt Burns Vancouver",
                  "location": "Vancouver, BC",
                  "arrangement": "On-site",
                  "employment": "Full-Time",
                  "salary": "$41,600 – $77,000 (salary + commission)",
                  "source": "BMO Careers",
                  "url": "https://jobs.bmo.com/global/en/job/R250020880/Investment-Associate-BMO-Nesbitt-Burns",
                  "fitScore": 85,
                  "dealbreaker": False,
                  "whyFit": "⚠️ Cert gap — score adjusted: Requires CIRO RR registration (full CSC + CPH). Sarik holds CSC Exam 1; Exam 2 is June 2026 and CPH is in progress. Apply immediately — the role sponsors licensing, and the June Exam 2 timeline aligns well with a Q3 2026 start.",
                  "hook": "I'm working toward CIRO registration — CSC Exam 2 is booked for June — and I'm looking to join a Nesbitt Burns advisor's team where I can add immediate client-service and administrative value while completing my licensing journey."
              },
              {
                  "company": "Coast Capital Savings",
                  "role": "Member Banking Specialist – Cloverdale Branch",
                  "location": "Surrey, BC",
                  "arrangement": "On-site",
                  "employment": "Full-Time",
                  "salary": "$49,700 – $57,200",
                  "source": "Coast Capital Careers",
                  "url": "https://careers.coastcapitalsavings.com/job/Surrey-Member-Banking-Specialist-FT-Cloverdale-Brit/835818900/",
                  "fitScore": 78,
                  "dealbreaker": False,
                  "whyFit": "Structured 18–24 month development journey from MBS to Member Advice Specialist — no cert-at-hire barrier, licensing is a development milestone within the program. Salary upper end $57.2K and the MAS progression track make this a strong secondary target.",
                  "hook": "Your 18–24 month MBS development program is exactly the structured entry I'm looking for — my MBA analytical skills and CSC progress would let me move through the training quickly and contribute to Coast Capital's member growth targets from day one."
              }
          ]

          def score_badge(score):
              if score >= 85:
                  color = "#C8A951"
              elif score >= 70:
                  color = "#1F906A"
              elif score >= 50:
                  color = "#C47A28"
              else:
                  color = "#C44040"
              return f'<span style="background:{color};color:#fff;font-weight:700;padding:3px 10px;border-radius:12px;font-size:13px;">{score} / 100</span>'

          jobs_html = ""
          for job in new_jobs:
              db_warning = ""
              if job["dealbreaker"]:
                  db_warning = '<p style="color:#C44040;font-weight:700;margin:6px 0;">⚠️ DEALBREAKER — verify before applying</p>'
              jobs_html += f"""
          <div style="border:1px solid #1A3050;border-radius:8px;padding:20px;margin-bottom:24px;background:#0C1D32;">
            <div style="margin-bottom:12px;">
              <strong style="font-size:17px;color:#EDE5D0;">{job['company']}</strong>
              <span style="color:#8A8070;margin:0 6px;">&#183;</span>
              <strong style="font-size:15px;color:#C8A951;">{job['role']}</strong>
            </div>
            <div style="margin-bottom:10px;">{score_badge(job['fitScore'])}</div>
            {db_warning}
            <table style="border-collapse:collapse;margin-bottom:12px;">
              <tr>
                <td style="padding:3px 12px 3px 0;color:#8A8070;font-size:13px;">Employment</td>
                <td style="padding:3px 0;color:#EDE5D0;font-size:13px;">{job['employment']}</td>
              </tr>
              <tr>
                <td style="padding:3px 12px 3px 0;color:#8A8070;font-size:13px;">Location</td>
                <td style="padding:3px 0;color:#EDE5D0;font-size:13px;">{job['location']} &middot; {job['arrangement']}</td>
              </tr>
              <tr>
                <td style="padding:3px 12px 3px 0;color:#8A8070;font-size:13px;">Salary</td>
                <td style="padding:3px 0;color:#EDE5D0;font-size:13px;">{job['salary']}</td>
              </tr>
              <tr>
                <td style="padding:3px 12px 3px 0;color:#8A8070;font-size:13px;">Apply</td>
                <td style="padding:3px 0;font-size:13px;"><a href="{job['url']}" style="color:#6AAEE0;">{job['source']} &#8599;</a></td>
              </tr>
            </table>
            <p style="color:#EDE5D0;font-size:13px;margin:8px 0 4px;"><strong style="color:#C8A951;">Why I'm a fit:</strong> {job['whyFit']}</p>
            <p style="color:#8A8070;font-size:13px;margin:8px 0 0;font-style:italic;">"{job['hook']}"</p>
          </div>"""

          html_body = f"""<!DOCTYPE html>
          <html><head><meta charset="UTF-8"></head>
          <body style="background:#06101C;color:#EDE5D0;font-family:Arial,sans-serif;padding:32px;max-width:720px;margin:0 auto;">
          <div style="border-bottom:2px solid #C8A951;padding-bottom:16px;margin-bottom:24px;">
            <p style="color:#C8A951;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;margin:0 0 6px;">Financial Services Job Board</p>
            <h1 style="color:#EDE5D0;font-size:24px;margin:0 0 4px;">3 New Roles &mdash; May 12, 2026</h1>
            <p style="color:#8A8070;font-size:14px;margin:0;">Sources: LinkedIn &middot; Indeed &middot; Glassdoor &middot; ZipRecruiter &middot; Big 5 banks &middot; 9 Metro Vancouver credit unions</p>
          </div>
          <p style="color:#EDE5D0;font-size:14px;margin:0 0 24px;">Sarik, here are today&rsquo;s new postings ranked by fit score. Total roles on your board: <strong>65</strong>.</p>
          {jobs_html}
          <div style="border-top:1px solid #1A3050;padding-top:16px;margin-top:8px;">
            <p style="color:#8A8070;font-size:12px;margin:0;">
              View your full board: <a href="https://rickandtech1.github.io/financial-job-board/" style="color:#6AAEE0;">rickandtech1.github.io/financial-job-board</a><br>
              Updates daily. Board now has 65 active roles.
            </p>
          </div>
          </body></html>"""

          payload = {
              "from": "Job Board <onboarding@resend.dev>",
              "to": [to_email],
              "subject": "Job Board Update — 2026-05-12: 3 new roles found",
              "html": html_body
          }

          tmp_path = "/tmp/resend_payload.json"
          with open(tmp_path, "w") as f:
              json.dump(payload, f)

          result = subprocess.run(
              ["curl", "-s", "-X", "POST", "https://api.resend.com/emails",
               "-H", f"Authorization: Bearer {resend_api_key}",
               "-H", "Content-Type: application/json",
               "--data-binary", f"@{tmp_path}"],
              capture_output=True, text=True
          )
          print("Resend response:", result.stdout)
          if result.returncode != 0:
              print("Resend error:", result.stderr)
          PYEOF
